name: CI/CD OPtiBox Frontend

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bastien-by/optibox-front

jobs:

  build:
    name: 🐳 Build & Push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🚀 Deploy sur RHEL
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 🔗 SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/OPtiBox/SHOP-STI_Front

            podman network exists optibox-shared-network || \
              podman network create optibox-shared-network

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              podman login ghcr.io -u ${{ github.actor }} --password-stdin

            podman pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            podman compose -f compose.yml -f compose.prod.yml up -d --remove-orphans

            podman compose -f compose.yml -f compose.prod.yml ps
            echo "✅ Frontend déployé !"
