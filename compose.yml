name: optibox-frontend

services:
  keycloak:
    image: keycloak/keycloak:latest
    container_name: optibox-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KC_BOOTSTRAP_ADMIN_USERNAME}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KC_BOOTSTRAP_ADMIN_PASSWORD}"
      KC_HTTPS_CERTIFICATE_FILE: /etc/x509/https/tls.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /etc/x509/https/tls.key
    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"   # HTTP (si tu veux le garder)
      - "${KEYCLOAK_HTTPS_PORT}:8443"  # HTTPS exposé
    volumes:
      - ./moyens_levage-realm.json:/opt/keycloak/data/import/moyens_levage-realm.json
      - ./certs/localhost.crt:/etc/x509/https/tls.crt
      - ./certs/localhost.key:/etc/x509/https/tls.key
    command: [ "start-dev", "--import-realm" ]


  angular-app:
    build: .
    container_name: angular-app
    depends_on:
      keycloak:
        condition: service_started
    ports:
      - "${ANGULAR_PORT}:4200"
    volumes:
      - /var/www/OPtiBox/SHOP-STI_Front/certs:/certs:ro
    networks:
      - optibox-shared-network

networks:
  optibox-shared-network:
    external: true
