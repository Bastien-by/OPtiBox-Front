<nav class="bg-white shadow-lg fixed w-full z-10">

          <img src="assets/images/OptiBoxLogo.jpg" alt="OptiBox Logo" class="h-10 w-auto self-center" />
        </div>

        <!-- Navigation links -->
        <div class="hidden sm:block sm:ml-6">
          <div class="flex space-x-4">

            <a *ngIf="isLoggedIn()"
               routerLink="racine" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <fa-icon [icon]="faHouse"></fa-icon>
            </a>

            <a *ngIf="isLoggedIn()"
               routerLink="withdraw-deposit" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <span class="hidden lg:inline">Retrait</span>
              <fa-icon [icon]="faBarcode" class="lg:hidden"></fa-icon>
            </a>

            <a *ngIf="isLoggedIn()"
               routerLink="deposit" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <span class="hidden lg:inline">Dépôt</span>
              <fa-icon [icon]="faBarcode" class="lg:hidden"></fa-icon>
            </a>

            <a *ngIf="isLoggedIn() && (isAdmin() || isMaintenance())"
               routerLink="check" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <span class="hidden lg:inline">Contrôles</span>
              <fa-icon [icon]="faListCheck" class="lg:hidden"></fa-icon>
            </a>

            <a *ngIf="isLoggedIn()"
               routerLink="history" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <span class="hidden lg:inline">Historique</span>
              <fa-icon [icon]="faClockRotateLeft" class="lg:hidden"></fa-icon>
            </a>

            <a *ngIf="isLoggedIn()"
               routerLink="procedures" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <span class="hidden lg:inline">Procédures</span>
              <fa-icon [icon]="faList" class="lg:hidden"></fa-icon>
            </a>

            <a *ngIf="isLoggedIn() && (isAdmin() || isMaintenance())"
               routerLink="product" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <span class="hidden lg:inline">Produits</span>
              <fa-icon [icon]="faBox" class="lg:hidden"></fa-icon>
            </a>

            <a *ngIf="isLoggedIn() && (isAdmin() || isMaintenance())"
               routerLink="stock" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <span class="hidden lg:inline">Stock</span>
              <fa-icon [icon]="faBoxesStacked" class="lg:hidden"></fa-icon>
            </a>

            <a *ngIf="isLoggedIn() && isAdmin()"
               routerLink="user" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <span class="hidden lg:inline">Utilisateurs</span>
              <fa-icon [icon]="faPeopleGroup" class="lg:hidden"></fa-icon>
            </a>

            <a *ngIf="isLoggedIn() && isAdmin()"
               routerLink="lockers" routerLinkActive="bg-gray-200"
               class="text-gray-500 hover:bg-gray-200 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">
              <span class="hidden lg:inline">Casiers</span>
              <fa-icon [icon]="faDoorOpen" class="lg:hidden"></fa-icon>
            </a>

          </div>
        </div>
      </div>

      <!-- Bouton connexion / user + logout -->
      <div class="flex items-center">

        <!-- NON connecté → bouton Connexion -->
        <div *ngIf="!isLoggedIn()">
          <button
            type="button"
            (click)="openLoginDialog()"
            class="text-white bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition">
            <fa-icon [icon]="faSignInAlt"></fa-icon>
            <span class="hidden sm:inline">Connexion</span>
          </button>
        </div>

        <!-- Connecté → nom + logout -->
        <div *ngIf="isLoggedIn()"
             class="text-gray-500 hover:text-gray-900 px-3 py-2 text-sm font-medium flex items-center">
          <span class="hidden lg:inline max-w-[140px] truncate">{{ getUsername() }}</span>
          <fa-icon [icon]="faCircleUser" class="lg:hidden text-2xl align-middle"></fa-icon>
          <button
            type="button"
            (click)="logout()"
            class="ml-4 text-white bg-red-600 hover:bg-red-700 px-3 py-2 rounded-md text-sm font-medium transition">
            <fa-icon [icon]="faSignOutAlt"></fa-icon>
          </button>
        </div>

      </div>
    </div>
  </div>
</nav>


<!-- ═══════════════════════════════════════════════════════
     DIALOG DE CONNEXION — saisie de l'identifiant / token
     ═══════════════════════════════════════════════════════ -->
<p-dialog
  header="Connexion à OPtiBox"
  [(visible)]="loginDialogVisible"
  [modal]="true"
  [closable]="true"
  [dismissableMask]="true"
  [style]="{ width: '360px' }"
  [baseZIndex]="10000">

  <div class="flex flex-col gap-4 py-2">

    <!-- Champ identifiant unique -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-semibold text-gray-700" for="login-token">
        Carte Maintenance
      </label>
      <input
        id="login-token"
        type="text"
        class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        placeholder="Saisissez votre ID Maintenance"
        [(ngModel)]="loginToken"
        (keydown)="onEnterKey($event)"
        [disabled]="loginLoading"
        autocomplete="off"
        autofocus>
    </div>

    <!-- Message d'erreur -->
    <div *ngIf="loginError"
         class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-md px-3 py-2 flex items-center gap-2">
      <span>⚠️</span>
      <span>{{ loginError }}</span>
    </div>

    <!-- Bouton valider -->
    <button
      type="button"
      (click)="submitLogin()"
      [disabled]="loginLoading"
      class="flex items-center justify-center gap-2 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-semibold py-2.5 rounded-md text-sm transition">
      <i *ngIf="loginLoading" class="pi pi-spin pi-spinner"></i>
      <fa-icon *ngIf="!loginLoading" [icon]="faSignInAlt"></fa-icon>
      {{ loginLoading ? 'Connexion...' : 'Se connecter' }}
    </button>

  </div>
</p-dialog>


<p-toast position="bottom-right"></p-toast>
