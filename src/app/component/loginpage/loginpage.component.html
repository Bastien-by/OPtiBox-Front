<div class="login-container">
  <p-toast></p-toast>

  <div class="scan-card">

    <!-- ✅ LOGO à la place du titre texte -->
    <img src="assets/images/OptiBoxLogo.jpg" alt="OptiBox" class="scan-logo" />

    <!-- Icône barcode animée -->
    <div class="scan-icon">
      <i class="pi pi-qrcode"></i>
    </div>

    <!-- Message principal -->
    <p class="scan-message">Veuillez scanner votre carte</p>

    <!-- Indicateur polling actif -->
    <div class="scan-status">
      <div class="pulse-dot"></div>
      <span>Scanner actif</span>
    </div>
  </div>
</div>
